name: Piloto Automatico Radar

on:
  schedule:
    # Se ejecuta todos los días a las 09:00 AM (Hora UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: # Esto permite darle al botón "Play" a mano desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Descargando código del repositorio
      uses: actions/checkout@v3

    - name: 🐍 Configurando Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Instalando dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚀 Ejecutando Radar de Novedades
      run: python main.py

    - name: 💾 Guardando cambios en la Base de Datos
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add radar_data.db
        git commit -m "Radar: Actualización automática de productos" || echo "No hay cambios para subir"
        git push