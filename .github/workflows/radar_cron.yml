name: Piloto Automatico Radar

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Para que no se queje de la versión

    steps:
    - name: 📥 Descargando código del repositorio
      uses: actions/checkout@v4 # Actualizado a v4

    - name: 🐍 Configurando Python
      uses: actions/setup-python@v5 # Actualizado a v5
      with:
        python-version: '3.10'

    - name: 📦 Instalando dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🌐 Instalando navegadores de Playwright
      run: npx playwright install chromium --with-deps

    - name: 🚀 Ejecutando Radar de Novedades
      run: python main.py

    - name: 💾 Guardando cambios en la Base de Datos
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f radar_data.db # El -f es la clave: FORZAMOS el guardado
        git commit -m "Radar: Actualización automática de productos" || echo "No hay cambios para subir"
        git push